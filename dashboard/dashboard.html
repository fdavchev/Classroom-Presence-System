<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPS — Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app-layout">

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay"></div>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">CP</div>
      <span class="logo-text">CPS Dashboard</span>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label">Overview</span>
      <a href="dashboard.html" class="nav-item">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>
        Analytics Hub
      </a>
      <a href="attendance.html" class="nav-item">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Attendance Log
      </a>

      <span class="nav-section-label" data-admin-only>Admin</span>
      <a href="#" class="nav-item" data-admin-only>
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Manage Users
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-user-initials">—</div>
      <div class="user-info">
        <div class="name" id="sidebar-user-name">—</div>
        <div class="role" id="sidebar-user-role">—</div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Sign out">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── Main Content ─────────────────────────────────────── -->
  <div class="main-content">

    <header class="page-header">
      <div class="flex items-center gap-2">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <div>
          <div class="page-title">Analytics Hub</div>
        </div>
      </div>
      <div class="header-actions">
        <span class="flex items-center gap-2 text-muted">
          <span class="status-dot live"></span>
          <span id="live-time" style="font-size:12px;"></span>
        </span>
        <button class="btn btn-secondary btn-sm" id="refresh-btn">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M4 4v5h.582m0 0a8 8 0 0114.814 2.5M4.582 9H9m11 11v-5h-.581m0 0a8 8 0 01-14.815-2.5M19.419 15H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="page-body">

      <!-- Metric Cards -->
      <div class="metrics-grid" id="metrics-grid">
        <!-- Skeleton placeholders -->
        <div class="metric-card amber">
          <div class="metric-label"><span class="skeleton skeleton-text" style="width:80px"></span></div>
          <div class="skeleton skeleton-value"></div>
          <div class="skeleton skeleton-text" style="width:100px;margin-top:4px"></div>
        </div>
        <div class="metric-card green">
          <div class="metric-label"><span class="skeleton skeleton-text" style="width:80px"></span></div>
          <div class="skeleton skeleton-value"></div>
          <div class="skeleton skeleton-text" style="width:100px;margin-top:4px"></div>
        </div>
        <div class="metric-card blue">
          <div class="metric-label"><span class="skeleton skeleton-text" style="width:80px"></span></div>
          <div class="skeleton skeleton-value"></div>
          <div class="skeleton skeleton-text" style="width:100px;margin-top:4px"></div>
        </div>
        <div class="metric-card red">
          <div class="metric-label"><span class="skeleton skeleton-text" style="width:80px"></span></div>
          <div class="skeleton skeleton-value"></div>
          <div class="skeleton skeleton-text" style="width:100px;margin-top:4px"></div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header">
            <div>
              <div class="chart-title">Attendance by Course</div>
              <div class="chart-subtitle">Total check-ins per subject</div>
            </div>
            <span class="badge badge-amber" id="chart1-period">This week</span>
          </div>
          <div class="chart-wrap">
            <canvas id="courseChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-header">
            <div>
              <div class="chart-title">Daily Attendance Trend</div>
              <div class="chart-subtitle">Check-ins over the last 14 days</div>
            </div>
            <span class="badge badge-blue">14 days</span>
          </div>
          <div class="chart-wrap">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Recent Activity Feed -->
      <div class="activity-feed">
        <div class="feed-header">
          <h3>Recent Check-ins</h3>
          <a href="attendance.html" class="btn btn-secondary btn-sm">View all</a>
        </div>
        <div id="feed-list">
          <!-- JS-populated -->
          <div class="feed-item">
            <div class="fi-avatar skeleton" style="width:34px;height:34px;border-radius:50%"></div>
            <div class="fi-body">
              <div class="skeleton skeleton-text" style="width:140px"></div>
              <div class="skeleton skeleton-text" style="width:90px;margin-top:4px"></div>
            </div>
          </div>
          <div class="feed-item">
            <div class="fi-avatar skeleton" style="width:34px;height:34px;border-radius:50%"></div>
            <div class="fi-body">
              <div class="skeleton skeleton-text" style="width:160px"></div>
              <div class="skeleton skeleton-text" style="width:80px;margin-top:4px"></div>
            </div>
          </div>
          <div class="feed-item">
            <div class="fi-avatar skeleton" style="width:34px;height:34px;border-radius:50%"></div>
            <div class="fi-body">
              <div class="skeleton skeleton-text" style="width:120px"></div>
              <div class="skeleton skeleton-text" style="width:100px;margin-top:4px"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
